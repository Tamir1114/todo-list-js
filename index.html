<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Todo List</h1>
    <p class="subtitle">Add tasks and keep track of what needs to be done.</p>

    <div class="input-row">
      <input
        type="text"
        id="todo-input"
        placeholder="Enter a task..."
        onkeydown="handleKeyDown(event)"
        maxlength="120"
      />
      <button onclick="addTodo()">Add</button>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    </div>

    <p class="stats" id="stats"></p>

    <ul id="todo-list"></ul>

    <p class="empty-msg hidden" id="empty-msg">Nothing to show here.</p>

    <div class="bottom-row">
      <button class="clear-btn" onclick="clearCompleted()">Clear completed</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
